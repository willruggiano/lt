[package]
name = "lt"
version = "0.1.0"
edition = "2024"
description = "A local-first Linear TUI for terminal power users"
license = "MIT"
homepage = "https://github.com/willruggiano/lt"
repository = "https://github.com/willruggiano/lt"

[dependencies]
anyhow = "1"
crossterm = "0.29"
base64 = "0.22"
clap = { version = "4.6", features = ["derive"] }
dirs = "6"
open = "5"
rand = "0.10"
ratatui = "0.30.0"
rusqlite = { version = "0.39", features = ["bundled"] }
chrono = { version = "0.4", features = ["clock"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
ureq = { version = "3", features = ["json"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
chumsky = "0.9"

[build-dependencies]
graphql-parser = "0.4"
toml = "1"
serde = { version = "1", features = ["derive"] }
quote = "1"
proc-macro2 = "1"
syn = { version = "2", default-features = false, features = ["full", "parsing"] }
prettyplease = "0.2"
