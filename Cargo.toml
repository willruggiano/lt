[package]
name = "lt"
version = "0.0.0"
edition = "2024"

[dependencies]
anyhow = "1"
crossterm = "0.29"
base64 = "0.22"
clap = { version = "4.5", features = ["derive"] }
dirs = "5"
open = "5"
rand = "0.8"
ratatui = "0.30.0"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
ureq = { version = "2", features = ["json"] }
url = "2"
