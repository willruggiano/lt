# Allowlist of IssueFilter fields exposed as stem keys in the search bar.
#
# Each [[field]] entry is validated at build time against
# docs/reference/linear-schema-definition.graphql:
#   - gql_field must exist in IssueFilter
#   - gql_type must match the field's GraphQL type (base name, ignoring
#     NonNull/List wrappers)
#
# The sort: stem is a UI concept with no IssueFilter backing and is
# hard-coded in build.rs; it is not listed here.

[[field]]
key       = "assignee"
gql_field = "assignee"
gql_type  = "NullableUserFilter"

[[field]]
key       = "priority"
gql_field = "priority"
gql_type  = "NullableNumberComparator"

[[field]]
key       = "state"
gql_field = "state"
gql_type  = "WorkflowStateFilter"

[[field]]
key       = "team"
gql_field = "team"
gql_type  = "TeamFilter"

[[field]]
key       = "label"
gql_field = "labels"
gql_type  = "IssueLabelCollectionFilter"

[[field]]
key       = "project"
gql_field = "project"
gql_type  = "NullableProjectFilter"

[[field]]
key       = "cycle"
gql_field = "cycle"
gql_type  = "NullableCycleFilter"

[[field]]
key       = "creator"
gql_field = "creator"
gql_type  = "NullableUserFilter"

# ---------------------------------------------------------------------------
# Sort field allowlist.
#
# Each [[sort_field]] entry is validated at build time against IssueSortInput
# in docs/reference/linear-schema-definition.graphql:
#   - gql_field must exist in IssueSortInput
#
# key     -- the user-typed sort key (e.g. "updated" -> sort:updated-)
# gql_field -- the field name inside IssueSortInput (schema-validated)
# sql_col -- the SQLite ORDER BY column (used by sort_col() and build_sql_order())
# ---------------------------------------------------------------------------

[[sort_field]]
key       = "updated"
gql_field = "updatedAt"
sql_col   = "updated_at"

[[sort_field]]
key       = "created"
gql_field = "createdAt"
sql_col   = "created_at"

[[sort_field]]
key       = "priority"
gql_field = "priority"
sql_col   = "priority_label"

[[sort_field]]
key       = "title"
gql_field = "title"
sql_col   = "title"

[[sort_field]]
key       = "assignee"
gql_field = "assignee"
sql_col   = "assignee_name"

[[sort_field]]
key       = "state"
gql_field = "workflowState"
sql_col   = "state_name"

[[sort_field]]
key       = "team"
gql_field = "team"
sql_col   = "team_name"
