# Allowlist of IssueFilter fields exposed as stem keys in the search bar.
#
# Each [[field]] entry is validated at build time against
# docs/reference/linear-schema-definition.graphql:
#   - gql_field must exist in IssueFilter
#   - gql_type must match the field's GraphQL type (base name, ignoring
#     NonNull/List wrappers)
#
# The sort: stem is a UI concept with no IssueFilter backing and is
# hard-coded in build.rs; it is not listed here.

[[field]]
key       = "assignee"
gql_field = "assignee"
gql_type  = "NullableUserFilter"

[[field]]
key       = "priority"
gql_field = "priority"
gql_type  = "NullableNumberComparator"

[[field]]
key       = "state"
gql_field = "state"
gql_type  = "WorkflowStateFilter"

[[field]]
key       = "team"
gql_field = "team"
gql_type  = "TeamFilter"

[[field]]
key       = "label"
gql_field = "labels"
gql_type  = "IssueLabelCollectionFilter"

[[field]]
key       = "project"
gql_field = "project"
gql_type  = "NullableProjectFilter"

[[field]]
key       = "cycle"
gql_field = "cycle"
gql_type  = "NullableCycleFilter"

[[field]]
key       = "creator"
gql_field = "creator"
gql_type  = "NullableUserFilter"
