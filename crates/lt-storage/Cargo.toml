[package]
name = "lt-storage"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[package.metadata.cargo-machete]
# chumsky is used only by the parser generated into OUT_DIR/search_stems.rs,
# which cargo-machete does not scan, so it would otherwise read as unused.
ignored = ["chumsky"]

[dependencies]
lt-config.workspace = true
lt-types.workspace = true
anyhow.workspace = true
base64.workspace = true
chrono.workspace = true
chumsky.workspace = true
dirs.workspace = true
rand.workspace = true
rusqlite.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
fake = { workspace = true, optional = true }

[build-dependencies]
graphql-parser.workspace = true
prettyplease.workspace = true
proc-macro2.workspace = true
quote.workspace = true
serde.workspace = true
syn.workspace = true
toml.workspace = true

[features]
# Deterministic simulation testing. See docs/design/dst.md.
sim = ["dep:fake"]
# Expose test-only helpers (in-memory DB, sample data) to dependent crates.
test-util = []

[lints]
workspace = true
