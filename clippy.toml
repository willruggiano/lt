cognitive-complexity-threshold = 20 # gocognit 20 / sonarjs cognitive 20
excessive-nesting-threshold = 5      # nestif 5
too-many-lines-threshold = 80       # funlen 80 lines / max-lines-per-function 80
too-many-arguments-threshold = 4     # max-params 4

# 0.1.x posture: breaking the public API to simplify is acceptable.
avoid-breaking-exported-api = false

# Ok for tests; never in production.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-print-in-tests = true
