[advisories]
version = 2
yanked = "deny"
# Vendored RustSec advisory database (pinned via the `advisory-db` flake input).
# The devshell startup hook and the checks.cargo-deny derivation materialize a
# git-shaped checkout at <db-path>/advisory-db-3157b0e258782691 (the subdir name
# cargo-deny derives from the db url) so `cargo deny --offline check` resolves the
# database locally instead of git-cloning github.com/rustsec/advisory-db. The path
# is relative to the cwd cargo-deny runs in (the project root under `make check`).
db-path = ".cache/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
version = 2
# Permissive licenses present in the dependency tree. Copyleft beyond MPL-2.0
# (weak, file-level) is rejected by omission.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
